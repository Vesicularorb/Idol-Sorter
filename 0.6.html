<style>
    body { background-color: #0f172a; color: #f3f4f6; overflow-x: hidden; user-select: none; scroll-behavior: smooth; }
    .custom-scrollbar::-webkit-scrollbar { width: 8px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #4f46e5; border-radius: 5px; }

    #workspace { display: flex; width: 100%; padding-top: 35px; padding-bottom: 80vh; position: relative; }
    #ranking-column { flex: 1; padding-left: 30px; max-width: 1750px; }
    #ranking-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; width: 100%; }

    #tool-column { position: fixed; right: 340px; top: 30px; width: 430px; display: flex; flex-direction: row; gap: 0; z-index: 9999; transition: opacity 0.2s ease, visibility 0.2s ease; }
    #tool-column.hidden-by-tray { opacity: 0; visibility: hidden; pointer-events: none; }
    #shift-tool { background: #1e293b; border: 2px solid #334155; border-radius: 12px; padding: 6px 10px; display: flex; flex-direction: row; align-items: center; gap: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); width: 100%; }
    
    #rolodex-sidebar { width: 300px; height: calc(100vh - 60px); position: fixed; right: 20px; top: 40px; background: #1e293b; border: 2px solid #334155; border-radius: 12px; display: flex; flex-direction: column; box-shadow: -10px 0 30px rgba(0,0,0,0.5); z-index: 50; }
    #rolodex-header { padding: 10px; border-bottom: 2px solid #334155; font-weight: 900; color: #6366f1; text-transform: uppercase; font-size: 0.75rem; }
    #rolodex-list { flex: 1; overflow-y: auto; padding: 10px; font-family: monospace; }

    #holding-cell { position: fixed; right: 340px; top: 80px; width: 430px; height: calc(100vh - 120px); background: #1e293b; border: 2px solid #4f46e5; border-radius: 12px; display: flex; flex-direction: column; z-index: 499; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    #holding-cell-header { padding: 6px 10px; border-bottom: 2px solid #334155; font-weight: 900; color: #6366f1; text-transform: uppercase; font-size: 0.65rem; text-align: center; flex-shrink: 0; letter-spacing: 0.1em; }
    #holding-cell-pool { flex: 1; overflow-y: auto; padding: 6px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; align-content: start; }
    #holding-cell-pool .idol-card { flex-direction: column; align-items: center; padding: 2px; width: 100%; height: auto; gap: 2px; }
    #holding-cell-pool .card-identity { width: 100%; height: auto; flex-direction: column-reverse; align-items: center; }
    #holding-cell-pool .idol-name { font-size: 10px; height: auto; line-height: 1.1; }
    #holding-cell-pool .img-tray { width: 100%; height: 85px; object-fit: cover; }
    #holding-cell-pool .img-tray:hover { transform: scale(1) !important; transition: none !important; z-index: 1 !important; box-shadow: none !important; cursor: grab; }
    
    .shift-input { background: #020617; border: 1px solid #4f46e5; border-radius: 6px; padding: 6px 8px; text-align: center; color: white; font-weight: 900; width: 60px; font-size: 14px; outline: none; flex-shrink: 0; }
    .shift-btn { background: #4f46e5; color: white; font-size: 10px; font-weight: 800; padding: 7px 10px; border-radius: 6px; text-transform: uppercase; border-bottom: 3px solid #312e81; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
    .shift-btn:hover { background: #6366f1; }
    .shift-label { font-size: 9px; font-weight: 900; color: #a5b4fc; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }

    .rolodex-item { padding: 6px 8px; border-bottom: 1px solid #334155; cursor: pointer; display: flex; gap: 8px; }
    .rolodex-num { color: #6366f1; font-weight: bold; width: 30px; }

    .rank-slot { height: 138px; background-color: #1e293b !important; border: 2px solid #334155; display: flex; align-items: center; border-radius: 12px; overflow: visible; position: relative; }
    .rank-slot:hover { z-index: 100; }
    .rank-number-box { width: 50px; background-color: #020617; color: #6366f1; border-right: 2px solid #334155; font-size: 1.4rem; font-weight: 900; display: flex; justify-content: center; align-items: center; height: 100%; flex-shrink: 0; }
    .divider-bar { grid-column: span 4; height: 4px; background: linear-gradient(90deg, transparent, #4f46e5, transparent); margin: 10px 0 20px 0; opacity: 0.8; }
    
    .card-note { flex: 1; height: 100%; display: flex; align-items: center; padding: 6px 4px; min-width: 0; }
    .card-note textarea { width: 100%; height: 100px; background: #020617; border: 1px solid #334155; border-radius: 6px; color: #94a3b8; font-size: 11px; padding: 6px 8px; resize: none; outline: none; font-family: monospace; line-height: 1.4; }
    .card-note textarea:focus { border-color: #4f46e5; color: #e2e8f0; }
    .card-note textarea::placeholder { color: #475569; font-style: italic; }
    
    .rank-target { flex: 1; height: 100%; display: flex; flex-direction: row; align-items: flex-start; padding: 5px 8px; gap: 12px; min-width: 0; overflow: visible; }
    .idol-card { display: flex; flex-direction: row; align-items: center; gap: 4px; width: 100%; height: 100%; position: relative; backface-visibility: hidden; transform: translateZ(0); will-change: transform; }
    .card-identity { display: flex; flex-direction: column-reverse; align-items: center; justify-content: flex-end; text-align: center; width: 80px; height: 130px; flex-shrink: 0; margin-top: 2px; }
    .idol-name { width: 100%; font-size: 12px; font-weight: 800; margin-bottom: 4px; text-transform: uppercase; color: #cbd5e1; line-height: 1.1; text-align: center; height: 24px; display: flex; align-items: center; justify-content: center; }

    .img-tray { width: 75px; height: 105px; object-fit: cover; border-radius: 6px; background: #334155; transition: transform 0.2s; position: relative; z-index: 1; }
	.img-tray:hover { 
        transform: scale(3.0); 
        transition-delay: 0.1s; 
        /* These lines fix the "behind others" issue */
        z-index: 999999 !important; 
        position: relative; 
        box-shadow: 0 0 60px rgba(0,0,0,1); 
    }
    body.library-dragging .img-tray:hover {
        transform: scale(1) !important;
        transition: none !important;
        z-index: 1 !important;
        box-shadow: none !important;
        transition-delay: 0s !important;
    }
    .img-rank { width: 78px; height: 105px; object-fit: cover; border-radius: 8px; transition: transform 0.2s; position: relative; z-index: 1; }
	.img-rank:hover { 
        transform: scale(2.5); 
        transition-delay: 0.1s; 
        /* These lines fix the "behind others" issue */
        z-index: 999999 !important; 
        position: relative; 
        box-shadow: 0 0 20px rgba(0,0,0,1); 
    }
    
    #tray { position: fixed; bottom: 0; left: 0; width: 100%; background: #0f172a; border-top: 3px solid #6366f1; z-index: 9000; display: flex; flex-direction: column; overflow: visible !important; transition: transform 0.3s ease-out; height: 350px; }
    #resizer { height: 4px; cursor: ns-resize; background: #4f46e5; width: 100%; flex-shrink: 0; }
    .tray-header { background-color: #0f172a; padding: 2px 0.75rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; height: 32px; position: relative; z-index: -1; }
    
    #idol-pool { display: grid; grid-template-columns: repeat(5, 1fr); gap: 5px; padding: 5px; overflow-y: auto; flex-grow: 1; overflow-x: visible !important; contain: initial !important; clip-path: none !important; }
    .group-wrapper { border-left: 4px solid transparent; margin-bottom: 1rem; overflow: visible !important; position: relative; z-index: 1; overflow: visible !important;}
    .group-wrapper:hover { z-index: 50; }
    .group-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 2px; overflow: visible !important; }
    .group-wrapper h2 { text-align: center; border-left: none !important; padding-left: 0 !important; }

<body>
    <header class="fixed top-0 w-full bg-slate-950 border-b border-slate-800 z-[210] p-1 flex justify-between items-center h-[30px]">
        <h1 class="text-sm font-black text-indigo-400 italic uppercase ml-4 tracking-tight">Idol Ranker Pro</h1>
        <div class="flex gap-2 mr-4">
            <button onclick="toggleTray()" id="header-open-btn" class="px-2 py-0.5 bg-indigo-600 text-white rounded font-bold text-[9px] uppercase hidden">Open Library</button>
            <button onclick="undoLast()" id="undo-btn" class="px-2 py-0.5 bg-slate-700 text-slate-400 rounded font-bold text-[9px] uppercase" title="Undo last action (Ctrl+Z)" disabled>↩ Undo</button>
            <button onclick="saveData()" class="px-2 py-0.5 bg-green-600 text-white rounded font-bold text-[9px] uppercase">Save</button>
            <button onclick="exportList()" class="px-2 py-0.5 bg-blue-600 text-white rounded font-bold text-[9px] uppercase">Export</button>
            <button onclick="clearAll()" class="px-2 py-0.5 bg-slate-800 text-white rounded font-bold text-[9px] uppercase">Reset</button>
        </div>
    </header>

    <div id="workspace">
        <main id="ranking-column"><div id="ranking-container"></div></main>
        
        <div id="tool-column">
            <div id="shift-tool">
                <span class="shift-label">Shift Target</span>
                <input type="number" id="shift-target" class="shift-input" placeholder="#" min="1" max="200">
                <button class="shift-btn" onclick="massShift('up')">UP ↑</button>
                <button class="shift-btn" onclick="massShift('down')">DOWN ↓</button>
            </div>
        </div>

        <div id="holding-cell">
            <div id="holding-cell-header" style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;">
                <span>⬇ Holding Cell</span>
                <button onclick="startHoldingCellSort()" style="background:#f59e0b;color:#1c1917;border:none;border-bottom:2px solid #b45309;border-radius:6px;padding:3px 8px;font-size:0.6rem;font-weight:900;text-transform:uppercase;cursor:pointer;letter-spacing:0.05em;white-space:nowrap;">⚖ Sort Cell</button>
            </div>
            <div id="holding-cell-pool" class="custom-scrollbar"></div>
        </div>

        <aside id="rolodex-sidebar">
            <div id="rolodex-header">Current Order</div>
            <div id="rolodex-list" class="custom-scrollbar"></div>
        </aside>
    </div>

    <div id="tray" class="flex flex-col">
        <div id="resizer"></div>
        <div class="tray-header">
            <div class="flex items-center gap-6 px-4">
                <span class="font-bold text-indigo-300 uppercase text-[10px]">Idol Library</span>
                <input type="text" id="search" placeholder="Search..." class="px-3 py-1 bg-slate-950 border border-slate-700 rounded-full text-xs w-64 text-white outline-none">
            </div>
            <button onclick="toggleTray()" class="px-5 py-1 bg-indigo-600 text-white rounded-full font-bold text-[10px] uppercase">Minimize</button>
        </div>
        <div id="idol-pool" class="custom-scrollbar"></div>
    </div>

        const toolColumn = document.getElementById('tool-column');
        const holdingCell = document.getElementById('holding-cell');

        // --- UNDO STACK ---
        const undoStack = [];
        let _preDragSnap = null;
        let _commitTimer = null;

        function _buildSnap() {
            const snap = {};
            document.querySelectorAll('.rank-target').forEach(slot => {
                const card = slot.querySelector('.idol-card');
                if (card) {
                    const ta = card.querySelector('.card-note textarea');
                    snap[slot.dataset.slot] = { name: card.dataset.name, note: ta ? ta.value : (card.dataset.note || '') };
                }
            });
            snap['__holding__'] = Array.from(document.querySelectorAll('#holding-cell-pool .idol-card')).map(c => c.dataset.name);
            return snap;
        }

        // Called at drag start — only the FIRST call per drag captures; subsequent
        // onStart events from other Sortables for the same drag are ignored.
        function capturePre() {
            if (_preDragSnap) return;
            _preDragSnap = _buildSnap();
        }

        // Called at drag end — deferred so ALL synchronous onEnd/onAdd callbacks
        // across every Sortable finish before we push exactly ONE snapshot.
        function commitSnap() {
            if (!_preDragSnap) return;
            clearTimeout(_commitTimer);
            _commitTimer = setTimeout(() => {
                if (!_preDragSnap) return;
                undoStack.push(_preDragSnap);
                _preDragSnap = null;
                if (undoStack.length > 50) undoStack.shift();
                const btn = document.getElementById('undo-btn');
                btn.disabled = false;
                btn.classList.remove('text-slate-400', 'bg-slate-700');
                btn.classList.add('text-white', 'bg-slate-600');
            }, 0);
        }

        // Legacy alias used by the holding-cell sort feature
        function snapshotState() { capturePre(); commitSnap(); }
        function undoLast() {
            if (!undoStack.length) return;
            // Cancel any in-flight deferred commit and wipe the pre-drag capture
            clearTimeout(_commitTimer);
            _preDragSnap = null;
            const snap = undoStack.pop();
            // Build lookup of where every card should end up in this snapshot
            const snapRanked = {}; // name -> {slotKey, note}
            Object.keys(snap).forEach(key => {
                if (key === '__holding__') return;
                snapRanked[snap[key].name] = { key, note: snap[key].note };
            });
            const snapHeld = new Set(snap['__holding__'] || []);

            // Collect every card currently on the board or in the holding cell
            const allActive = [
                ...Array.from(document.querySelectorAll('.rank-target .idol-card')),
                ...Array.from(document.querySelectorAll('#holding-cell-pool .idol-card'))
            ];

            // Move each card directly to its target destination — no intermediate hidden state
            allActive.forEach(card => {
                const name = card.dataset.name;
                if (snapRanked[name]) {
                    // Goes to a rank slot
                    const { key, note } = snapRanked[name];
                    const target = document.querySelector(`.rank-target[data-slot="${key}"]`);
                    card.querySelector('img').className = 'img-rank';
                    card.dataset.note = note || '';
                    target.appendChild(card);
                    attachNote(card);
                    card.style.display = '';
                } else if (snapHeld.has(name)) {
                    // Goes to holding cell
                    card.querySelector('img').className = 'img-tray';
                    detachNote(card);
                    document.getElementById('holding-cell-pool').appendChild(card);
                    card.style.display = '';
                } else {
                    // Goes back to library — hide the placed card, show the library original
                    detachNote(card);
                    card.querySelector('img').className = 'img-tray';
                    idolPool.appendChild(card);
                    card.style.display = 'none';
                    // Show the library copy
                    const orig = idolPool.querySelector(`.idol-card[data-name="${name}"]`);
                    if (orig) orig.style.display = '';
                }
            });

            // Also restore any ranked/held cards that weren't on the board at all
            // (cards that were in library before this snapshot but need to be placed now)
            Object.keys(snapRanked).forEach(name => {
                const { key, note } = snapRanked[name];
                const target = document.querySelector(`.rank-target[data-slot="${key}"]`);
                if (!target.querySelector('.idol-card')) {
                    const card = document.querySelector(`.idol-card[data-name="${name}"]`);
                    if (card) {
                        card.querySelector('img').className = 'img-rank';
                        card.dataset.note = note || '';
                        target.appendChild(card);
                        attachNote(card);
                        card.style.display = '';
                    }
                }
            });
            snapHeld.forEach(name => {
                const pool = document.getElementById('holding-cell-pool');
                if (!pool.querySelector(`.idol-card[data-name="${name}"]`)) {
                    const card = document.querySelector(`.idol-card[data-name="${name}"]`);
                    if (card) {
                        card.querySelector('img').className = 'img-tray';
                        detachNote(card);
                        pool.appendChild(card);
                        card.style.display = '';
                    }
                }
            });
            updateRolodex();
            if (!undoStack.length) {
                const btn = document.getElementById('undo-btn');
                btn.disabled = true;
                btn.classList.add('text-slate-400', 'bg-slate-700');
                btn.classList.remove('text-white', 'bg-slate-600');
            }
        }
        document.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoLast(); } });

        // --- HOLDING CELL SORT (Merge Sort comparisons) ---
        function startHoldingCellSort() {
            const cards = Array.from(document.querySelectorAll('#holding-cell-pool .idol-card'));
            if (cards.length < 2) return;

            const items = cards.map(c => ({
                name: c.dataset.name,
                src: c.querySelector('img').src,
                card: c
            }));

            // Merge sort comparison queue builder
            let comparisons = [];
            let results = null;

            function buildMergeSort(arr) {
                if (arr.length <= 1) return Promise.resolve(arr);
                const mid = Math.floor(arr.length / 2);
                return buildMergeSort(arr.slice(0, mid)).then(left =>
                    buildMergeSort(arr.slice(mid)).then(right =>
                        merge(left, right)
                    )
                );
            }

            // We'll drive comparisons iteratively via a callback queue
            let resolveCompare;
            let totalComparisons = 0;
            const estimatedTotal = Math.ceil(items.length * Math.log2(items.length));

            function compare(a, b) {
                return new Promise(resolve => {
                    resolveCompare = (winner) => resolve(winner === 'a' ? -1 : 1);
                    showComparison(a, b, totalComparisons, estimatedTotal);
                    totalComparisons++;
                });
            }

            async function merge(left, right) {
                const result = [];
                let i = 0, j = 0;
                while (i < left.length && j < right.length) {
                    const cmp = await compare(left[i], right[j]);
                    if (cmp <= 0) result.push(left[i++]);
                    else result.push(right[j++]);
                }
                return result.concat(left.slice(i)).concat(right.slice(j));
            }

            // Build overlay
            const overlay = document.createElement('div');
            overlay.id = 'sort-overlay';
            overlay.style.cssText = 'position:fixed;inset:0;background:rgba(10,15,28,0.82);z-index:100000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;';

            overlay.innerHTML = `
                <button onclick="document.getElementById('sort-overlay').remove()" style="position:absolute;top:20px;right:28px;background:rgba(255,255,255,0.08);border:1px solid #475569;color:#94a3b8;border-radius:50%;width:36px;height:36px;font-size:1.2rem;cursor:pointer;font-weight:700;display:flex;align-items:center;justify-content:center;">✕</button>
                <div style="color:#f59e0b;font-size:0.7rem;font-weight:900;text-transform:uppercase;letter-spacing:0.15em;margin-bottom:18px;">⚖ Sort Holding Cell — Pick Your Favourite</div>
                <div id="sort-progress-bar-wrap" style="width:520px;height:4px;background:#1e293b;border-radius:4px;margin-bottom:28px;overflow:hidden;"><div id="sort-progress-bar" style="height:100%;background:#f59e0b;width:0%;transition:width 0.3s;border-radius:4px;"></div></div>
                <div id="sort-arena" style="display:flex;align-items:center;gap:48px;"></div>
                <div id="sort-counter" style="margin-top:22px;color:#475569;font-size:0.7rem;font-weight:700;letter-spacing:0.1em;"></div>`;
            document.body.appendChild(overlay);

            function showComparison(a, b, done, total) {
                const arena = document.getElementById('sort-arena');
                const bar = document.getElementById('sort-progress-bar');
                const counter = document.getElementById('sort-counter');
                if (bar) bar.style.width = Math.round((done / total) * 100) + '%';
                if (counter) counter.textContent = `Comparison ${done + 1} of ~${total}`;
                arena.innerHTML = '';
                [a, b].forEach((item, idx) => {
                    const side = idx === 0 ? 'a' : 'b';
                    const col = document.createElement('div');
                    col.style.cssText = 'display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;';
                    col.innerHTML = `
                        <div style="border:3px solid #334155;border-radius:16px;overflow:hidden;transition:border-color 0.15s,box-shadow 0.15s;width:220px;height:300px;">
                            <img src="${item.src}" style="width:100%;height:100%;object-fit:cover;display:block;">
                        </div>
                        <div style="color:#e2e8f0;font-size:0.85rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;text-align:center;max-width:220px;">${item.name}</div>
                        <div style="background:#4f46e5;color:white;border:none;border-bottom:3px solid #312e81;border-radius:10px;padding:10px 32px;font-size:0.75rem;font-weight:900;text-transform:uppercase;letter-spacing:0.08em;cursor:pointer;">★ Pick Her</div>`;
                    col.addEventListener('mouseenter', () => col.querySelector('div').style.borderColor = '#f59e0b');
                    col.addEventListener('mouseleave', () => col.querySelector('div').style.borderColor = '#334155');
                    col.addEventListener('click', () => {
                        if (resolveCompare) resolveCompare(side);
                    });
                    arena.appendChild(col);
                    if (idx === 0) {
                        const vs = document.createElement('div');
                        vs.style.cssText = 'color:#4f46e5;font-size:2rem;font-weight:900;';
                        vs.textContent = 'VS';
                        arena.appendChild(vs);
                    }
                });
            }

            // Run sort, then apply results
            buildMergeSort([...items]).then(sorted => {
                const overlay = document.getElementById('sort-overlay');
                if (!overlay) return; // user closed it
                overlay.remove();
                snapshotState();
                // Re-order holding cell pool
                const pool = document.getElementById('holding-cell-pool');
                sorted.forEach(item => {
                    pool.appendChild(item.card);
                });
            });
        }

        // --- SHIFT TOOL VISIBILITY BASED ON TRAY HEIGHT ---
        function updateToolColumnVisibility() {
            const trayMinimized = tray.dataset.minimized === "true";
            if (trayMinimized) {
                toolColumn.classList.remove('hidden-by-tray');
                holdingCell.classList.remove('hidden-by-tray');
                return;
            }
            const trayTop = tray.getBoundingClientRect().top;
            const toolBottom = toolColumn.getBoundingClientRect().bottom;
            if (toolBottom > trayTop) {
                toolColumn.classList.add('hidden-by-tray');
            } else {
                toolColumn.classList.remove('hidden-by-tray');
            }
        }

        function initGrid() {
            rankingContainer.innerHTML = "";
            for (let i = 1; i <= 200; i++) {
                const slot = document.createElement('div');
                slot.className = "rank-slot shadow-lg";
                slot.innerHTML = `<div class="rank-number-box">${i}</div><div class="rank-target" data-slot="${i}"></div>`;
                rankingContainer.appendChild(slot);
                if (i % 20 === 0 && i < 200) {
                    const div = document.createElement('div');
                    div.className = "divider-bar";
                    rankingContainer.appendChild(div);
                }
            }
        }

        function updateRolodex() {
            rolodexList.innerHTML = "";
            for (let i = 1; i <= 200; i++) {
                const target = document.querySelector(`.rank-target[data-slot="${i}"]`);
                const card = target ? target.querySelector('.idol-card') : null;
                const name = card ? card.dataset.name : "---";
                const item = document.createElement('div');
                item.className = "rolodex-item";
                item.onclick = () => {
                    const t = document.querySelector(`.rank-target[data-slot="${i}"]`);
                    t.scrollIntoView({ behavior: 'smooth', block: 'center' });
                };
                item.innerHTML = `<span class="rolodex-num">${i}.</span> <span class="rolodex-name">${name}</span>`;
                rolodexList.appendChild(item);
            }
        }

        function pushDown(slotNum) {
            if (slotNum >= 200) return;
            const target = document.querySelector(`.rank-target[data-slot="${slotNum}"]`);
            const occupant = target ? target.querySelector('.idol-card') : null;
            if (occupant) {
                pushDown(slotNum + 1);
                const nextTarget = document.querySelector(`.rank-target[data-slot="${slotNum + 1}"]`);
                if (nextTarget) nextTarget.appendChild(occupant);
            }
        }

        function massShift(direction) {
            const startRank = parseInt(document.getElementById('shift-target').value);
            if (isNaN(startRank) || startRank < 1 || startRank > 200) return;
            if (direction === 'down') {
                let lastFull = startRank;
                while(lastFull < 200 && document.querySelector(`.rank-target[data-slot="${lastFull}"]`).children.length > 0) { lastFull++; }
                for (let i = lastFull; i >= startRank; i--) {
                    const current = document.querySelector(`.rank-target[data-slot="${i}"]`);
                    const next = document.querySelector(`.rank-target[data-slot="${i+1}"]`);
                    const card = current ? current.querySelector('.idol-card') : null;
                    if(card) next.appendChild(card);
                }
            } else if (direction === 'up') {
                let firstGap = -1;
                for (let j = startRank - 1; j >= 1; j--) {
                    if (document.querySelector(`.rank-target[data-slot="${j}"]`).children.length === 0) { firstGap = j; break; }
                }
                if (firstGap !== -1) {
                    for (let i = firstGap; i < startRank; i++) {
                        const next = document.querySelector(`.rank-target[data-slot="${i+1}"]`);
                        const current = document.querySelector(`.rank-target[data-slot="${i}"]`);
                        const card = next ? next.querySelector('.idol-card') : null;
                        if (card) current.appendChild(card);
                    }
                }
            }
            updateRolodex();
        }

		function renderLibrary(query = "") {
            idolPool.innerHTML = "";
            const q = query.toLowerCase();
            Object.keys(idolData).forEach(group => {
                const members = idolData[group];
                const showList = members.filter(m => m.toLowerCase().includes(q) || group.toLowerCase().includes(q));
                if (showList.length > 0) {
                    const wrap = document.createElement('div');
                    wrap.className = `group-wrapper header-${group.toLowerCase().replace(/[^a-z0-9]/g, '')}`;
                    wrap.innerHTML = `<h2 class="font-bold uppercase mb-1 tracking-widest text-[14px]">${group}</h2>
                        <div class="group-grid sortable-group" data-group-name="${group}">
                        ${showList.map(name => `
                            <div class="idol-card rounded p-1 cursor-grab" data-name="${name}" data-home-group="${group}" data-note="">
                                <div class="card-identity">
                                    <img src="${photoMap[name] || 'https://via.placeholder.com/68x95'}" class="img-tray">
                                    <p class="idol-name">${name}</p>
                                </div>
                                <div class="card-note" style="display:none;"></div>
                            </div>`).join('')}</div>`;
                    idolPool.appendChild(wrap);
                }
            });
            // Re-bind the new group-grids so they are draggable
            bindLibraryDraggables();
        }
		function bindLibraryDraggables() {
            // Find all the group grids we just created in the search
            document.querySelectorAll('.sortable-group').forEach(el => {
                // If Sortable is already on this grid, don't add it again (stops lag)
                if (Sortable.get(el)) return; 
                
                new Sortable(el, {
                    group: { name: 'ranking', pull: 'clone', put: false },
                    animation: 0,
                    sort: false,
                    onStart: () => { capturePre(); workspace.classList.add('dragging-from-library'); document.body.classList.add('library-dragging'); },
                    onEnd: (evt) => {
                        workspace.classList.remove('dragging-from-library');
                        document.body.classList.remove('library-dragging');
                        const trayRect = document.getElementById('tray').getBoundingClientRect();
                        
                        // If girl is dropped back in the library area
                        if (evt.originalEvent.clientY > trayRect.top) {
                            const original = document.querySelector(`#idol-pool .idol-card[data-name="${evt.item.dataset.name}"]`);
                            if (original) original.style.display = 'block';
                            if (evt.to.classList.contains('rank-target')) evt.item.remove();
                        } else {
                            // Only commit the undo snap if the card actually landed somewhere useful
                            commitSnap();
                        }
                    }
                });
            });
        }
		function attachNote(card) {
            const noteDiv = card.querySelector('.card-note');
            if (!noteDiv) return;
            noteDiv.style.display = 'flex';
            if (!noteDiv.querySelector('textarea')) {
                const ta = document.createElement('textarea');
                ta.placeholder = 'Add a note...';
                ta.value = card.dataset.note || '';
                ta.addEventListener('input', () => { card.dataset.note = ta.value; });
                // Prevent drag from starting when clicking textarea
                ta.addEventListener('mousedown', e => e.stopPropagation());
                noteDiv.appendChild(ta);
            } else {
                noteDiv.querySelector('textarea').value = card.dataset.note || '';
            }
        }

        function detachNote(card) {
            const noteDiv = card.querySelector('.card-note');
            if (noteDiv) noteDiv.style.display = 'none';
        }

		function initSortables() {
            // RANKING TARGETS CONFIG (The 200 Slots - SETUP ONCE)
            document.querySelectorAll('.rank-target').forEach(el => {
                new Sortable(el, {
                    group: 'ranking',
                    animation: 0,
                    onMove: function (evt) {
                        const trayRect = document.getElementById('tray').getBoundingClientRect();
                        if (evt.draggedRect.bottom > trayRect.top) return false;
                        return true;
                    },
                    onAdd: (evt) => {
                        const slotNum = parseInt(el.dataset.slot);
                        const existingCards = Array.from(el.querySelectorAll('.idol-card')).filter(c => c !== evt.item);
                        if (existingCards.length > 0) {
                            const occupant = existingCards[0];
                            pushDown(slotNum + 1);
                            const nextTarget = document.querySelector(`.rank-target[data-slot="${slotNum + 1}"]`);
                            if (nextTarget) nextTarget.appendChild(occupant);
                        }
                        if (evt.clone) {
                            const original = document.querySelector(`#idol-pool .idol-card[data-name="${evt.item.dataset.name}"]`);
                            if (original) original.style.display = 'none';
                        }
                        evt.item.querySelector('img').className = 'img-rank';
                        attachNote(evt.item);
                        updateRolodex();
                    },
                    onStart: (evt) => {
                        capturePre();
                        detachNote(evt.item);
                    },
                    onEnd: (evt) => {
                        // If still in a rank-target, re-show the note
                        if (evt.item.closest('.rank-target')) {
                            attachNote(evt.item);
                        }
                        const trayRect = document.getElementById('tray').getBoundingClientRect();
                        if (evt.originalEvent.clientY > trayRect.top) {
                            const name = evt.item.dataset.name;
                            const original = document.querySelector(`#idol-pool .idol-card[data-name="${name}"]`);
                            if (original) original.style.display = 'block';
                            evt.item.remove();
                        }
                        updateRolodex();
                        commitSnap();
                    }
                });
            });
            // Initial bind for the library
            bindLibraryDraggables();

            // Holding Cell Sortable
            new Sortable(document.getElementById('holding-cell-pool'), {
                group: 'ranking',
                animation: 0,
                onStart: () => { capturePre(); },
                onAdd: (evt) => {
                    // If dropped here from library (clone), hide the original
                    if (evt.clone) {
                        const original = document.querySelector(`#idol-pool .idol-card[data-name="${evt.item.dataset.name}"]`);
                        if (original) original.style.display = 'none';
                    }
                    // Keep img-tray class (small size) in the holding cell, no note
                    evt.item.querySelector('img').className = 'img-tray';
                    detachNote(evt.item);
                },
                onEnd: (evt) => {
                    // If dragged back into the library tray area, restore the library card
                    const trayRect = document.getElementById('tray').getBoundingClientRect();
                    if (evt.originalEvent.clientY > trayRect.top) {
                        const name = evt.item.dataset.name;
                        const original = document.querySelector(`#idol-pool .idol-card[data-name="${name}"]`);
                        if (original) original.style.display = 'block';
                        evt.item.remove();
                    } else {
                        commitSnap();
                    }
                }
            });
        }

        function toggleTray() {
            const openBtn = document.getElementById('header-open-btn');
            if (tray.style.transform === 'translateY(100%)' || tray.dataset.minimized === "true") {
                tray.style.transform = 'translateY(0)';
                tray.dataset.minimized = "false";
                openBtn.classList.add('hidden');
            } else {
                tray.style.transform = 'translateY(100%)';
                tray.dataset.minimized = "true";
                openBtn.classList.remove('hidden');
            }
            // Check visibility after toggle animation
            setTimeout(updateToolColumnVisibility, 350);
        }

        function saveData() {
            const data = {};
            document.querySelectorAll('.rank-target').forEach(slot => {
                const card = slot.querySelector('.idol-card');
                if (card) {
                    const ta = card.querySelector('.card-note textarea');
                    if (ta) card.dataset.note = ta.value;
                    data[slot.dataset.slot] = { name: card.dataset.name, note: card.dataset.note || '' };
                }
            });
            localStorage.setItem('idolRankingCache', JSON.stringify(data));
            const held = Array.from(document.querySelectorAll('#holding-cell-pool .idol-card')).map(c => c.dataset.name);
            localStorage.setItem('idolHoldingCell', JSON.stringify(held));

            const ranked = Object.keys(data).length;
            const heldCount = held.length;

            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:99999;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:#1e293b;border:2px solid #22c55e;border-radius:16px;padding:32px 36px;max-width:380px;text-align:center;box-shadow:0 0 60px rgba(34,197,94,0.3);">
                    <div style="font-size:3rem;margin-bottom:12px;">💾</div>
                    <h2 style="color:#22c55e;font-size:1.1rem;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">Saved!</h2>
                    <p style="color:#94a3b8;font-size:0.8rem;line-height:1.6;margin-bottom:24px;">
                        <span style="color:#86efac;font-weight:700;">${ranked}</span> girl${ranked !== 1 ? 's' : ''} ranked &nbsp;·&nbsp;
                        <span style="color:#86efac;font-weight:700;">${heldCount}</span> in holding cell
                    </p>
                    <button id="modal-save-ok" style="background:#22c55e;color:#052e16;border:none;border-bottom:3px solid #15803d;border-radius:8px;padding:10px 32px;font-weight:900;font-size:0.8rem;text-transform:uppercase;cursor:pointer;">Got it</button>
                </div>`;
            document.body.appendChild(modal);
            document.getElementById('modal-save-ok').onclick = () => modal.remove();
            modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
        }

        function loadData() {
            const saved = localStorage.getItem('idolRankingCache');
            if (saved) {
                const data = JSON.parse(saved);
                Object.keys(data).forEach(slotNum => {
                    const item = data[slotNum];
                    const target = document.querySelector(`.rank-target[data-slot="${slotNum}"]`);
                    const card = document.querySelector(`#idol-pool .idol-card[data-name="${item.name}"]`);
                    if (card && target) {
                        card.querySelector('img').classList.replace('img-tray', 'img-rank');
                        if (item.note) card.dataset.note = item.note;
                        target.appendChild(card);
                        attachNote(card);
                    }
                });
            }
            // Load holding cell — find each card in the library pool and move it
            const heldRaw = localStorage.getItem('idolHoldingCell');
            if (heldRaw) {
                const holdingPool = document.getElementById('holding-cell-pool');
                JSON.parse(heldRaw).forEach(name => {
                    const card = document.querySelector(`#idol-pool .idol-card[data-name="${name}"]`);
                    if (card) {
                        card.style.display = '';
                        card.querySelector('img').className = 'img-tray';
                        detachNote(card);
                        holdingPool.appendChild(card);
                    }
                });
            }
            updateRolodex();
        }

        function exportList() {
            let list = "IDOL RANKER PRO - CURRENT LIST\n==============================\n\n";
            for (let i = 1; i <= 200; i++) {
                const target = document.querySelector(`.rank-target[data-slot="${i}"]`);
                const card = target ? target.querySelector('.idol-card') : null;
                if (card) {
                    const ta = card.querySelector('.card-note textarea');
                    const note = (ta ? ta.value : card.dataset.note || '').trim();
                    const notePart = note ? ` - (${note})` : '';
                    list += `${i}. ${card.dataset.name}${notePart}\n`;
                } else {
                    list += `${i}. ---\n`;
                }
            }
            const blob = new Blob([list], { type: "text/plain" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = "My_Idol_Rankings.txt";
            link.click();
        }

        let isResizing = false;
        document.getElementById('resizer').addEventListener('mousedown', () => isResizing = true);
        document.addEventListener('mousemove', e => {
            if (isResizing) {
                let h = window.innerHeight - e.clientY;
                if (h > 60) tray.style.height = h + 'px';
                updateToolColumnVisibility();
            }
        });
        document.addEventListener('mouseup', () => { isResizing = false; });

        let searchTimeout;
        document.getElementById('search').addEventListener('input', e => {
            // Stop the browser from rebuilding the library immediately
            clearTimeout(searchTimeout);
            
            // Wait 200ms after you stop typing to run the search
            searchTimeout = setTimeout(() => {
                renderLibrary(e.target.value);
            }, 200); 
        });

	window.onload = () => {
    initGrid();
    renderLibrary(); 
    initSortables(); // <--- It runs here once and never again
    loadData();
    updateRolodex();
    tray.style.height = '350px';
    updateToolColumnVisibility();
};

        function clearAll() {
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:99999;display:flex;align-items:center;justify-content:center;';
            modal.innerHTML = `
                <div style="background:#1e293b;border:2px solid #ef4444;border-radius:16px;padding:32px 36px;max-width:380px;text-align:center;box-shadow:0 0 60px rgba(239,68,68,0.4);">
                    <div style="font-size:3rem;margin-bottom:12px;">⚠️</div>
                    <h2 style="color:#ef4444;font-size:1.1rem;font-weight:900;text-transform:uppercase;letter-spacing:0.05em;margin-bottom:10px;">Wipe Everything?</h2>
                    <p style="color:#94a3b8;font-size:0.8rem;line-height:1.6;margin-bottom:24px;">This will permanently delete your rankings, holding cell, and all notes. <strong style="color:#f87171;">This cannot be undone.</strong></p>
                    <div style="display:flex;gap:12px;justify-content:center;">
                        <button id="modal-cancel" style="background:#334155;color:#cbd5e1;border:none;border-radius:8px;padding:10px 24px;font-weight:800;font-size:0.8rem;text-transform:uppercase;cursor:pointer;">Cancel</button>
                        <button id="modal-confirm" style="background:#ef4444;color:white;border:none;border-bottom:3px solid #b91c1c;border-radius:8px;padding:10px 24px;font-weight:800;font-size:0.8rem;text-transform:uppercase;cursor:pointer;">Yes, Reset All</button>
                    </div>
                </div>`;
            document.body.appendChild(modal);
            document.getElementById('modal-cancel').onclick = () => modal.remove();
            document.getElementById('modal-confirm').onclick = () => {
                localStorage.removeItem('idolRankingCache');
                localStorage.removeItem('idolHoldingCell');
                location.reload();
            };
        }
    </script>
</body>
</html>
